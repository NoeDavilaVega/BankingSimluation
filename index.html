<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Credit Card Debt Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.panel{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
padding:10px 15px;
font-size:16px;
cursor:pointer;
}

input{
padding:5px;
font-size:16px;
}

.stat{
font-size:18px;
margin:5px 0;
}

#taunt{
color:#a00;
font-weight:bold;
}

canvas{
background:white;
}

</style>
</head>

<body>

<h1>Credit Card Debt Simulator</h1>

<div class="panel">

<div class="stat">Month: <span id="month">0</span></div>
<div class="stat">Balance: $<span id="balance">0</span></div>
<div class="stat">APR: <span id="apr">22</span>%</div>
<div class="stat">Total Interest Paid: $<span id="interestPaid">0</span></div>

</div>

<div class="panel">

<div class="stat">Interest this month: $<span id="interest">0</span></div>
<div class="stat">Minimum payment: $<span id="minpay">0</span></div>

<label>Your payment: $</label>
<input type="number" id="payment" value="100">

<button onclick="nextMonth()">Next Month</button>

</div>

<div class="panel">
<div id="event"></div>
<div id="taunt"></div>
</div>

<div class="panel">
<canvas id="chart"></canvas>
</div>

<script>

let balance = 2000
let apr = 22
let month = 0
let totalInterest = 0
let history = [balance]

let events = [
{ text:"Car repair! +$500", amount:500 },
{ text:"Bought a new phone! +$900", amount:900 },
{ text:"Medical bill! +$700", amount:700 },
{ text:"Concert tickets! +$300", amount:300 },
{ text:"You were responsible this month.", amount:0 }
]

let taunts = [
"The bank appreciates your business.",
"Minimum payments make us very rich.",
"See you in debt for 20 years!",
"Interest never sleeps.",
"The bank CEO thanks you personally."
]

const ctx = document.getElementById("chart")

const chart = new Chart(ctx,{
type:"line",
data:{
labels:["0"],
datasets:[{
label:"Balance",
data:[balance]
}]
},
options:{
responsive:true
}
})

function minimumPayment(){

return Math.max(balance*0.02,25)

}

function randomEvent(){

if(Math.random()<0.3){

let e = events[Math.floor(Math.random()*events.length)]

balance += e.amount

document.getElementById("event").innerText = e.text

}else{

document.getElementById("event").innerText = ""

}

}

function bankTaunt(){

let t = taunts[Math.floor(Math.random()*taunts.length)]

document.getElementById("taunt").innerText = t

}

function updateDisplay(){

document.getElementById("month").innerText = month
document.getElementById("balance").innerText = balance.toFixed(2)
document.getElementById("interestPaid").innerText = totalInterest.toFixed(2)

let min = minimumPayment()

document.getElementById("minpay").innerText = min.toFixed(2)

}

function nextMonth(){

if(balance<=0){

alert("You escaped debt!")
return

}

month++

randomEvent()

let monthlyRate = apr/100/12

let interest = balance * monthlyRate

balance += interest

totalInterest += interest

document.getElementById("interest").innerText = interest.toFixed(2)

let payment = parseFloat(document.getElementById("payment").value)

if(payment>balance){

payment = balance

}

balance -= payment

history.push(balance)

chart.data.labels.push(month)

chart.data.datasets[0].data = history

chart.update()

bankTaunt()

updateDisplay()

if(month>=36 && balance>0){

alert("36 months passed. You are still in debt!")

}

}

updateDisplay()

</script>

</body>
</html>
