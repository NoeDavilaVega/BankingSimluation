<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exponential Simulator Game</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.15);
}

button{
padding:10px 18px;
font-size:16px;
margin:5px;
cursor:pointer;
}

.slider{
width:100%;
}

.stat{
font-size:18px;
margin:5px;
}

.scenario{
font-size:18px;
padding:15px;
margin:10px;
}

.goal{
font-size:22px;
text-align:center;
background:#fff3cd;
padding:15px;
border-radius:8px;
}

.math{
background:#e8f4ff;
padding:15px;
border-radius:8px;
}

.toggle{
margin:10px;
}

</style>
</head>

<body>

<h1>Exponential Simulation Game</h1>

<div id="menu" class="panel">

<h2>Choose Your Challenge</h2>

<button class="scenario" onclick="start('credit')">
💳 Escape Credit Card Debt
</button>

<button class="scenario" onclick="start('invest')">
📈 Become an Investment Millionaire
</button>

<button class="scenario" onclick="start('loan')">
📉 Pay Off a Loan
</button>

<button class="scenario" onclick="start('lab')">
🔬 Exponential Lab
</button>

</div>

<div id="game" style="display:none">

<div class="panel goal" id="goal"></div>

<div class="panel">

<div class="stat">Month: <span id="month">0</span></div>
<div class="stat">Value: $<span id="value">0</span></div>
<div class="stat">Total Interest: $<span id="interest">0</span></div>
<div class="stat">Score: <span id="score">0</span></div>

</div>

<div class="panel">

<label>Starting Value (a)</label>

<input type="range" min="100" max="10000" value="2000" id="aSlider" class="slider">

<span id="aValue"></span>

<br><br>

<label>Growth Factor (b)</label>

<input type="range" min="0.95" max="1.05" step="0.001" value="1.02" id="bSlider" class="slider">

<span id="bValue"></span>

<br><br>

<label id="paymentLabel">Monthly Payment</label>

<input type="range" min="0" max="1000" value="100" id="paySlider" class="slider">

<span id="payValue"></span>

</div>

<div class="panel">

<button onclick="step()">Step 1 Month</button>
<button onclick="step10()">Step 10 Months</button>
<button onclick="reset()">Reset</button>

</div>

<div class="panel">

<label class="toggle">

<input type="checkbox" id="showTheory" checked>
Show y = a(b)^x curve

</label>

</div>

<div class="panel">

<canvas id="chart"></canvas>

</div>

<div class="panel math">

<h3>Exponential Model</h3>

<b>y = a(b)<sup>x</sup></b>

<p>

a = starting value

<br>

b = growth/decay factor

<br>

x = time

</p>

<p id="growthType"></p>

</div>

</div>

<script>

let mode
let month
let value
let totalInterest
let history=[]
let theory=[]
let chart

function start(m){

mode=m

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

if(mode=="credit"){
document.getElementById("goal").innerText="Goal: Pay off the credit card with the least interest."
}

if(mode=="invest"){
document.getElementById("goal").innerText="Goal: Reach $100,000 as fast as possible."
}

if(mode=="loan"){
document.getElementById("goal").innerText="Goal: Pay off the loan before 60 months."
}

if(mode=="lab"){
document.getElementById("goal").innerText="Experiment with exponential growth and decay."
}

initChart()
reset()

}

function initChart(){

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:[],
datasets:[
{
label:"Simulation",
data:[]
},
{
label:"y = a(b)^x",
data:[]
}
]

}

})

}

function reset(){

month=0
totalInterest=0

let a=parseFloat(aSlider.value)

value=a

history=[value]
theory=[value]

chart.data.labels=[0]
chart.data.datasets[0].data=[value]
chart.data.datasets[1].data=[value]

chart.update()

updateUI()

}

function step(){

let b=parseFloat(bSlider.value)
let payment=parseFloat(paySlider.value)

month++

let interest=value*(b-1)

totalInterest+=Math.max(interest,0)

value=value*b-payment

if(value<0)value=0

history.push(value)

let a=parseFloat(aSlider.value)

let theoretical=a*Math.pow(b,month)

theory.push(theoretical)

chart.data.labels.push(month)

chart.data.datasets[0].data=history

if(showTheory.checked)
chart.data.datasets[1].data=theory
else
chart.data.datasets[1].data=[]

chart.update()

updateUI()

}

function step10(){

for(let i=0;i<10;i++)step()

}

function updateUI(){

monthDisplay.innerText=month
valueDisplay.innerText=value.toFixed(2)
interestDisplay.innerText=totalInterest.toFixed(2)

let score=Math.round(value-totalInterest)

scoreDisplay.innerText=score

aValue.innerText=aSlider.value
bValue.innerText=bSlider.value
payValue.innerText=paySlider.value

let b=parseFloat(bSlider.value)

if(b>1)growthType.innerText="Exponential Growth"
else if(b<1)growthType.innerText="Exponential Decay"
else growthType.innerText="Constant"

}

aSlider.oninput=updateUI
bSlider.oninput=updateUI
paySlider.oninput=updateUI

const monthDisplay=document.getElementById("month")
const valueDisplay=document.getElementById("value")
const interestDisplay=document.getElementById("interest")
const scoreDisplay=document.getElementById("score")

updateUI()

</script>

</body>
</html>
