<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exponential Simulation Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
max-width:1000px;
margin:auto;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.panel{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
padding:10px 16px;
font-size:16px;
margin:4px;
cursor:pointer;
}

input{
font-size:16px;
padding:5px;
}

#modeMenu button{
font-size:18px;
padding:14px;
}

.bigEvent{
font-size:26px;
text-align:center;
padding:20px;
background:#fff3cd;
border-radius:10px;
}

.mathBox{
background:#e8f4ff;
padding:15px;
border-radius:8px;
}

.stat{
font-size:18px;
margin:4px;
}

</style>
</head>

<body>

<h1>Exponential Simulation Lab</h1>

<div class="panel" id="modeMenu">

<h2>Choose Simulation</h2>

<button onclick="setMode('credit')">Credit Card Debt</button>
<button onclick="setMode('investment')">Investment Growth</button>
<button onclick="setMode('loan')">Loan Payoff</button>
<button onclick="setMode('explore')">Pure Exponential Explorer</button>

</div>

<div id="simulation" style="display:none">

<div class="panel">

<div class="stat">Time (x): <span id="time">0</span></div>
<div class="stat">Current Value (y): $<span id="value">0</span></div>

</div>

<div class="panel">

<label>a (starting value)</label>
<input id="aInput" type="number" value="2000">

<br><br>

<label>b (growth/decay factor)</label>
<input id="bInput" type="number" step="0.001" value="1.02">

<br><br>

<button onclick="step()">Step Forward</button>
<button onclick="step10()">Step 10</button>
<button onclick="resetSim()">Reset</button>

</div>

<div class="panel">

<div class="bigEvent" id="modeExplanation"></div>

</div>

<div class="panel">

<canvas id="chart"></canvas>

</div>

<div class="panel mathBox">

<h3>Exponential Model</h3>

<p>

<b>y = a(b)<sup>x</sup></b>

</p>

<ul>

<li>a = starting value</li>
<li>b = growth factor</li>
<li>x = time</li>

</ul>

<p id="growthExplanation"></p>

</div>

</div>

<script>

let mode = ""
let a = 2000
let b = 1.02
let x = 0
let value = 2000

let history=[]
let chart

function setMode(m){

mode = m

document.getElementById("modeMenu").style.display="none"
document.getElementById("simulation").style.display="block"

if(mode==="credit"){

a=2000
b=1.02

document.getElementById("modeExplanation").innerText=
"Credit Card Debt grows each month due to interest."

}

if(mode==="investment"){

a=1000
b=1.01

document.getElementById("modeExplanation").innerText=
"Investments grow as interest compounds."

}

if(mode==="loan"){

a=5000
b=0.98

document.getElementById("modeExplanation").innerText=
"Loan balance decays as payments exceed interest."

}

if(mode==="explore"){

a=100
b=1.05

document.getElementById("modeExplanation").innerText=
"Experiment freely with exponential growth and decay."

}

document.getElementById("aInput").value=a
document.getElementById("bInput").value=b

initChart()

resetSim()

}

function initChart(){

const ctx=document.getElementById("chart")

chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{
label:"Simulation",
data:[]
}
]
},
options:{responsive:true}
})

}

function updateGrowthText(){

if(b>1){

document.getElementById("growthExplanation").innerText=
"Since b > 1, the function shows exponential growth."

}
else if(b<1){

document.getElementById("growthExplanation").innerText=
"Since b < 1, the function shows exponential decay."

}
else{

document.getElementById("growthExplanation").innerText=
"When b = 1, the value stays constant."

}

}

function resetSim(){

a=parseFloat(document.getElementById("aInput").value)
b=parseFloat(document.getElementById("bInput").value)

x=0
value=a

history=[value]

chart.data.labels=[0]
chart.data.datasets[0].data=[value]
chart.update()

updateDisplay()
updateGrowthText()

}

function step(){

b=parseFloat(document.getElementById("bInput").value)

x++

value=value*b

history.push(value)

chart.data.labels.push(x)
chart.data.datasets[0].data=history
chart.update()

updateDisplay()

}

function step10(){

for(let i=0;i<10;i++){

step()

}

}

function updateDisplay(){

document.getElementById("time").innerText=x
document.getElementById("value").innerText=value.toFixed(2)

}

</script>

</body>
</html>
