<!DOCTYPE html>
<html>
<head>
  <title>Mortgage Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    .slider-container {
      margin-bottom: 25px;
    }
    input[type="range"] {
      width: 100%;
    }
    .value {
      font-weight: bold;
    }
    .result {
      margin-top: 30px;
      font-size: 1.3em;
    }
  </style>
</head>
<body>

  <h2>Mortgage Calculator</h2>

  <div class="slider-container">
    <label>Loan Amount: $<span class="value" id="loanValue">300000</span></label>
    <input type="range" id="loan" min="50000" max="1000000" step="10000" value="300000">
  </div>

  <div class="slider-container">
    <label>Interest Rate (%): <span class="value" id="rateValue">5</span></label>
    <input type="range" id="rate" min="1" max="10" step="0.1" value="5">
  </div>

  <div class="slider-container">
    <label>Loan Term (years): <span class="value" id="termValue">30</span></label>
    <input type="range" id="term" min="5" max="40" step="1" value="30">
  </div>

  <div class="result">
    Monthly Payment: $<span id="payment">0</span>
  </div>

  <script>
    const loan = document.getElementById("loan");
    const rate = document.getElementById("rate");
    const term = document.getElementById("term");

    const loanValue = document.getElementById("loanValue");
    const rateValue = document.getElementById("rateValue");
    const termValue = document.getElementById("termValue");
    const payment = document.getElementById("payment");

    function calculate() {
      const P = parseFloat(loan.value);
      const annualRate = parseFloat(rate.value) / 100;
      const monthlyRate = annualRate / 12;
      const n = parseFloat(term.value) * 12;

      let monthlyPayment;

      if (monthlyRate === 0) {
        monthlyPayment = P / n;
      } else {
        monthlyPayment = 
          P * (monthlyRate * Math.pow(1 + monthlyRate, n)) /
          (Math.pow(1 + monthlyRate, n) - 1);
      }

      payment.textContent = monthlyPayment.toFixed(2);
    }

    function update() {
      loanValue.textContent = loan.value;
      rateValue.textContent = rate.value;
      termValue.textContent = term.value;
      calculate();
    }

    loan.oninput = update;
    rate.oninput = update;
    term.oninput = update;

    update();
  </script>

</body>
</html>
