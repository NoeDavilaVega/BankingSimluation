<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infection Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

canvas{
border:1px solid black;
background:white;
margin-top:10px;
}

.tabs button{
padding:8px 14px;
margin:5px;
cursor:pointer;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.diseaseBlock{
border:1px solid #ccc;
background:white;
padding:8px;
margin:6px;
display:inline-block;
}

</style>
</head>

<body>

<h2>Infection Simulator</h2>

<div class="tabs">
<button onclick="showTab('sim')">Simulation</button>
<button onclick="showTab('graph')">Graph</button>
</div>

<!-- SIM TAB -->

<div id="sim" class="tab active">

<canvas id="simCanvas" width="900" height="500"></canvas>

<br>

Population
<input type="range" id="popSlider" min="50" max="2000" value="500">
<span id="popValue"></span>

<br>

Starting Infected
<input type="range" id="startSlider" min="1" max="50" value="5">
<span id="startValue"></span>

<br>

Movement Speed
<input type="range" id="moveSlider" min="0" max="5" step="0.2" value="1">
<span id="moveValue"></span>

<br>

Simulation Speed
<input type="range" id="speedSlider" min="0.25" max="20" step="0.25" value="1">
<span id="speedValue"></span>x

<br><br>

<button onclick="addDisease()">Add Disease</button>

<div id="diseaseControls"></div>

<br>

<button onclick="start()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<br><br>

Day: <span id="time">0</span>
|
Healthy: <span id="healthy">0</span>

<div id="status"></div>

</div>


<!-- GRAPH TAB -->

<div id="graph" class="tab">

<canvas id="graphCanvas" width="900" height="500"></canvas>

</div>

<script>

let canvas=document.getElementById("simCanvas")
let ctx=canvas.getContext("2d")

let people=[]
let infectedLists=[]

let diseases=[]
let chart

let simTime=0
let lastDay=0

let timer=null

const tickMS=40
const dayLength=1000

let infectionBuffer=[]
let infectionAccumulator=[]

const colors=[
"red","blue","purple","orange","black","brown","cyan"
]

function showTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="graph" && chart){
chart.resize()
chart.update()
}

}

function updateSliderLabels(){

popValue.innerText=popSlider.value
startValue.innerText=startSlider.value
moveValue.innerText=moveSlider.value
speedValue.innerText=speedSlider.value
}

document.querySelectorAll("input[type=range]").forEach(s=>{
s.oninput=updateSliderLabels
})

function addDisease(){

let id=diseases.length

diseases.push({
name:"Disease "+(id+1),
color:colors[id%colors.length],
infectivity:2,
model:"exponential"
})

renderDiseaseControls()
reset()
}

function removeDisease(i){

diseases.splice(i,1)
renderDiseaseControls()
reset()
}

function renderDiseaseControls(){

let container=document.getElementById("diseaseControls")
container.innerHTML=""

diseases.forEach((d,i)=>{

let div=document.createElement("div")
div.className="diseaseBlock"

div.innerHTML=`

<input value="${d.name}"
oninput="diseases[${i}].name=this.value">

<br>

<b style="color:${d.color}">Color</b>

<br>

Infectivity

<input type="range"
min="1"
max="10"
value="${d.infectivity}"
oninput="diseases[${i}].infectivity=parseInt(this.value);document.getElementById('inf${i}').innerText=this.value">

<span id="inf${i}">${d.infectivity}</span>

<br>

<select onchange="diseases[${i}].model=this.value">

<option value="exponential" ${d.model==="exponential"?"selected":""}>Exponential</option>
<option value="quadratic" ${d.model==="quadratic"?"selected":""}>Quadratic</option>
<option value="linear" ${d.model==="linear"?"selected":""}>Linear</option>

</select>

<br>

<button onclick="removeDisease(${i})">Remove</button>
`

container.appendChild(div)

})

}

function reset(){

pause()

people=[]
infectedLists=[]
infectionBuffer=[]
infectionAccumulator=[]

simTime=0
lastDay=0

let pop=parseInt(popSlider.value)
let start=parseInt(startSlider.value)

for(let i=0;i<pop;i++){

people.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
disease:null
})

}

for(let i=0;i<diseases.length;i++){
infectedLists.push([])
infectionBuffer.push(0)
infectionAccumulator.push(0)
}

let index=0

for(let d=0;d<diseases.length;d++){

for(let i=0;i<start;i++){

if(index<people.length){

people[index].disease=d
infectedLists[d].push(people[index])
index++

}

}

}

initGraph()
draw()
updateStats()

}

function findClosestHealthy(px,py){

let best=null
let bestDist=Infinity

for(let p of people){

if(p.disease!==null) continue

let dx=p.x-px
let dy=p.y-py

let dist=dx*dx+dy*dy

if(dist<bestDist){

bestDist=dist
best=p

}

}

return best

}

function step(){

let speed=parseFloat(speedSlider.value)

simTime+=tickMS*speed

let moveSpeed=parseFloat(moveSlider.value)

for(let p of people){

p.x+=(Math.random()-0.5)*moveSpeed*4
p.y+=(Math.random()-0.5)*moveSpeed*4

p.x=Math.max(0,Math.min(canvas.width,p.x))
p.y=Math.max(0,Math.min(canvas.height,p.y))

}

let day=Math.floor(simTime/dayLength)

if(day>lastDay){

for(let i=0;i<diseases.length;i++){

let x=diseases[i].infectivity
let infected=infectedLists[i].length

let newCases=0

if(diseases[i].model==="linear")
newCases=x

else if(diseases[i].model==="quadratic")
newCases=x*x

else
newCases=infected*x

infectionBuffer[i]+=newCases

}

lastDay=day

}

for(let i=0;i<diseases.length;i++){

let perTick=infectionBuffer[i]/(dayLength/tickMS)

infectionAccumulator[i]+=perTick

while(infectionAccumulator[i]>=1){

let carriers=infectedLists[i]

if(carriers.length===0) break

let carrier=carriers[Math.floor(Math.random()*carriers.length)]

let target=findClosestHealthy(carrier.x,carrier.y)

if(!target) break

target.disease=i
infectedLists[i].push(target)

infectionAccumulator[i]-=1
infectionBuffer[i]-=1

}

}

draw()
updateStats()
updateGraph()

if(people.every(p=>p.disease!==null)){

pause()
status.innerText="Simulation finished"

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let p of people){

ctx.beginPath()

ctx.arc(p.x,p.y,3,0,Math.PI*2)

if(p.disease===null)
ctx.fillStyle="white"
else
ctx.fillStyle=diseases[p.disease].color

ctx.fill()
ctx.stroke()

}

}

function updateStats(){

let healthyCount = people.filter(p=>p.disease===null).length

time.innerText = (simTime/1000).toFixed(2)
healthy.innerText = healthyCount

}

function start(){

pause()

timer=setInterval(step,tickMS)

}

function pause(){

if(timer){
clearInterval(timer)
timer=null
}

}

function initGraph(){

if(chart) chart.destroy()

let ctx2=document.getElementById("graphCanvas")

let datasets=[{
label:"Healthy",
borderColor:"green",
data:[people.length]
}]

diseases.forEach((d,i)=>{

datasets.push({
label:d.name,
borderColor:d.color,
data:[infectedLists[i].length]
})

})

chart=new Chart(ctx2,{
type:"line",
data:{labels:[0],datasets:datasets},
options:{animation:false}
})

}

function updateGraph(){

let t=simTime/1000

chart.data.labels.push(t)

let healthyCount=people.filter(p=>p.disease===null).length

chart.data.datasets[0].data.push(healthyCount)

for(let i=0;i<diseases.length;i++){

chart.data.datasets[i+1].data.push(infectedLists[i].length)

}

chart.update()

}

updateSliderLabels()
addDisease()

</script>

</body>
</html>
